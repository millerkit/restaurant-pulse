# Generated as a template — replace `app` with a globally-unique name and
# `primary_region` with whichever Fly region is closest to you (see
# `fly platform regions`). Both get set for real when you run `fly launch`.
app = "restaurant-pulse"
primary_region = "sjc"

[build]

[[mounts]]
  source = "restaurant_data"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
